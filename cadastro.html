<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <link rel="stylesheet" href="cadastro.css">
    <title>cadastro</title>
</head>

<body>
    <main class="area-cadastro">
        <section class="area-titulo">
            <h1>cadastra-se</h1>
            <section class="area-formulario">
                <form action="#" class="form-cadastro">
                    <div class="area-nome">
                        <div class="primeiro-nome">
                            <label for="nome"> nome</label>
                            <input type="text" id="nome" required placeholder="digite seu nome">
                            <div class="ultimo-nome">
                                <label for="#">sobrenome</label>
                                <input type="text" id="sobrenome" placeholder="digite seu sobrenome">

                            </div>

                        </div>
                    </div>
                    <div class="area-acesso">
                        <div class="e-mail">
                            <label for="e-mail"> <e-mail></label>
                            <input type="e-mail" id="e-mail" placeholder="e-mail" readonly>
                        </div>
                        <div class="senha">
                            <label for="senha">senha</label>
                            <input type="password" id="senha" placeholder="•••••••••" required>
                        </div>
                        <div class="area-contato">
                            <div class="ddd">
                                <label for="ddd">ddd</label>
                                <input type="number" max="99" id="ddd" placeholder="ddd">
                            </div>
                            <div class="telefone">
                                <label for="telefone">telefone</label>
                                <input type="text" id="telefone" placeholder="digite seu telefone" required>
                            </div>
                            <div class="area-endereco">
                                <label for="endereco"></label>
                                <input type="text" id="endereco" placeholder="digite seu endereco">
                                <div class="numero">numero
                                    <input type="number" id="numero" placeholder=000>
                                    <div class="cidade">
                                        <label for="cidade">cidade</label>
                                        <input type="text" id="cidade" placeholder="cidade">
                                    </div>
                                </div>
                                <div class="cep">
                                    <label for="cep">cep</label>
                                    <input type="text" id="cep" placeholder="00000-000">
                                </div>
                                <div class="area-dados">
                                    <div class="data-nacimento">
                                        <label for="data-nacimento">data-nacimento</label>
                                        <input type="date" id="data-nacimento" required>
                                    </div>
                                    <div class="genero">
                                        <label for="genero">genero</label>
                                        <select id="genero" required>
                                            <option value="" disabled section>selecione seu genero</option>
                                            <option value="#">feminino</option>
                                            <option value="#">masculino</option>
                                            <option value="#">outro</option>
                                            <option value="#">prefiro nao responder</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="area-botao"> <button type="submit" id="botao-cadastrar">
                            cadastrar
                        </button>
                        <a href="#" class="link-login">ja possui uma conta? Acesse agora!</a>
                    </div>
                </form>
            </section>
        </section>
    </main>

</body>

</html>
