<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>site da tia sonia</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <header>
        <nav>
            <img src="/imagem/logo-tia-sonia.png" alt="logo do site"controls: height="100" width="200">
            
        
            <ul>

                <li><a class="icones" href="#"><i class="fa-regular fa-house"></i></a></li>
                <li><a class="icones" href="#">bordados</a></li>
                <li><a class="icones" href="#"><i class="fa-solid fa-cart-shopping"></i></a></li>
                <li><a class="icones" href="#"><i class="fa-solid fa-user-clock"></i></a></li>
       
        </ul>
         </nav>
    </header>
    <main>
        <article class="area_banner">
            <section id="banner">
                <img src="imagem/banner 2.png" alt="banner bordados da tia sônia"
                id="banner_image">
            </section>
            <section id="reservas">
                <h2 id="reservas_titulos">vagas na agenda da semana:3 disponiveis</h2>
               <button id="reservas_botao">Reservar Vaga</button>
            </section>
        </article >
        <article class="area_sobre">
            <section class="sobre">
                <h1  class="sobre_titulo">Conheça a Tia Sônia </h1>
                <p class="sobre_texto">
                    A tia Sônia, está super feliz em ter você por aqui. Ela borda todos os dias e ama o que faz, se você gosta de bordados como ela,ou conhece alguém que amaria receber um bordado, visite o seu catálogo e faca uma reserva. </p>
                <img class="sobre_foto" src="imagem/tia-sonia.png" alt="mulher com cabelos grisalhos em um jardim de rosas">
            </section>
        </article>
    </main>
</body>
</html>
