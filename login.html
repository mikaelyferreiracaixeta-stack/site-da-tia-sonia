<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>tela de login</title>
</head>
<body>
    <header>
        <nav class="area-navegacao">
            <img class="logo" src="img/logo-tia-sonia.png" alt="Logo do site" width="150px">
            <ul>
                <li><a class="icones" href="index.html"><i class="fa-solid fa-house-chimney"></i></a></li>
                <li><a class="icones" href="#bordados"><i class="fa-solid fa-scissors"></i></a></li>
                <li><a class="icones" href="#"><i class="fa-solid fa-cart-arrow-down"></i></a></li>
                <li><a class="icones" href="login.html"><i class="fa-solid fa-user-gear"></i></a></li>
            </ul>
        </nav>
    </header>

    <main class="area-cadastro " id="cadastro">
       
        </footer>
        <section class="area-titulo">
            <h1>Login</h1>
        </section>
        <section class="area-formulario">
            <form action="#" class="form-cadastro" id="form-logar">
                <div class="area-acesso formatacao">
                    <div class="e-mail titulo-campo">
                        <label for="e-mail"> E-mail</label>
                        <input type="e-mail" id="e-mail" placeholder="e-mail" readonly>
                    </div>
                    <div class="senha titulo-campo">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" placeholder="•••••••••" required>
                    </div>
                </div>
                <div class="area-botao formatacao">
                    <button type="submit" id="botao-cadastrar">
                    Entrar</button>
                        <a href="#" class="link-login">Esqueceu sua senha? clique aqui!</a>
                    <a href="cadastro.html" class="link-login">Não possui uma conta? Clique aqui!</a>
                </div>
            </form>
        </section>
        </section>
    </main>
<script src="login-cadastro.js"></script>
</body>

</html>
